display_information:
  name: SentinelSwarm
  description: Evidence-linked crisis coordination for monsoon flood response.
  background_color: "#1f2937"
features:
  bot_user:
    display_name: SentinelSwarm
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:join
      - channels:read
      - channels:history
      - chat:write
      - search:read.public
settings:
  event_subscriptions:
    bot_events:
      - app_mention
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
